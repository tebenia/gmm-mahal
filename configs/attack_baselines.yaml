# Attack-baseline presets ported from the EMBER notebooks.
# Source model/data/SHAP assets remain in sibling projects.

baselines:
  ember2018_20pct:
    kind: ember2018
    dataset_id: ember
    result_root: results/ember/20%
    train_fraction: 0.2
    test_fraction: 1.0
    model: lightgbm
    feature_version: 2
    model_file: ember_model_2018.txt
    shap_path: ../Severi Data Poisoning Attack/ember2018_dynamic/shap_values_ember_lightgbm_train_1p0_v2.pkl
    feature_selection:
      - shap_largest_abs
    value_selection:
      - min_population_new
    sampling_strategy: random
    poison_rates:
      - 0.005
    watermark_sizes:
      - 17
    iterations: 1

  ember2024_win64_20pct:
    kind: ember2024
    dataset_id: ember2024_win64
    result_root: results/ember2024/win64
    platform: Win64
    train_fraction: 0.2
    test_fraction: 1.0
    subset_mode: stratified_random
    model: lightgbm
    model_path: ../ember2024/EMBER2024/examples/lgbm_win64_retrained.joblib
    shap_cache_dir: ../Severi Data Poisoning Attack/ember2024_shap_cache/Win64
    feature_selection:
      - combined_shap
    value_selection:
      - combined_shap
    sampling_strategy: random
    poison_rates:
      - 0.005
    watermark_sizes:
      - 17
    iterations: 1

  ember2024_win32_0p0667:
    kind: ember2024
    dataset_id: ember2024_win32
    result_root: results/ember2024/win32
    platform: Win32
    train_fraction: 0.0667
    test_fraction: 1.0
    subset_mode: stratified_random
    model: lightgbm
    model_path: ../ember2024/EMBER2024/Model/EMBER2024_Win32.model
    shap_cache_dir: ../Severi Data Poisoning Attack/ember2024_shap_cache/Win32
    feature_selection:
      - combined_shap
    value_selection:
      - combined_shap
    sampling_strategy: random
    poison_rates:
      - 0.005
    watermark_sizes:
      - 17
    iterations: 1
