# Attack-baseline presets ported from the EMBER notebooks.
# Code lives in this repository. Data, model, and SHAP paths are configurable.
#
# Grid fields can be listed here and the runner will iterate them:
#   feature_selection: [combined_shap, shap_largest_abs]
#   value_selection: [combined_shap, min_population_new, argmin_Nv_sum_abs_shap, quantile_10, benign_prototype, low_shap_signed, frequency_bounded, frequency_bounded_signed_shap, corr_count_abs_shap]
#   sampling_strategies: [random, cosine_similarity]
#   poison_rates: [0.005, 0.01]
#   watermark_sizes: [17, 25]
#
# Note: combined_shap is a combined feature/value selector, so it runs as
# combined_shap + combined_shap. If combined_shap also appears in value_selection,
# it is skipped for regular feature selectors such as shap_largest_abs.

baselines:
  ember2018_20p:
    kind: ember2018
    dataset_id: ember
    result_root: results/ember/20%
    train_fraction: 0.2
    test_fraction: 1.0
    model: lightgbm
    feature_version: 2
    data_dir: ../Severi Data Poisoning Attack/ember2018_dynamic
    model_path: ../Severi Data Poisoning Attack/ember2018_dynamic/ember_model_2018.txt
    shap_path: ../Severi Data Poisoning Attack/ember2018_dynamic/shap_values_ember_lightgbm_train_1p0_v2.pkl
    feature_selection:
      - shap_largest_abs
    value_selection:
      - min_population_new
    target_features: feature_space_feasible
    sampling_strategies:
      - random
    poison_rates:
      - 0.005
    watermark_sizes:
      - 17
    iterations: 1

  ember2024_win64_20p:
    kind: ember2024
    dataset_id: ember2024_win64
    result_root: results/ember2024/win64
    platform: Win64
    train_fraction: 0.2
    test_fraction: 1.0
    subset_mode: stratified_random
    model: lightgbm
    data_root: ../ember2024/EMBER2024/data
    model_path: ../ember2024/EMBER2024/examples/lgbm_win64_retrained.joblib
    shap_cache_dir: ../Severi Data Poisoning Attack/ember2024_shap_cache/Win64
    feature_selection:
      - combined_shap
    value_selection:
      - combined_shap
    target_features: feature_space_feasible
    sampling_strategies:
      - random
    poison_rates:
      - 0.005
    watermark_sizes:
      - 17
    iterations: 1

  ember2024_win32_06p:
    kind: ember2024
    dataset_id: ember2024_win32
    result_root: results/ember2024/win32
    platform: Win32
    train_fraction: 0.0667
    test_fraction: 1.0
    subset_mode: stratified_random
    model: lightgbm
    data_root: ../ember2024/EMBER2024/data
    model_path: ../ember2024/EMBER2024/Model/EMBER2024_Win32.model
    shap_cache_dir: ../Severi Data Poisoning Attack/ember2024_shap_cache/Win32
    feature_selection:
      - combined_shap
    value_selection:
      - combined_shap
    target_features: feature_space_feasible
    sampling_strategies:
      - random
    poison_rates:
      - 0.005
    watermark_sizes:
      - 17
    iterations: 1
